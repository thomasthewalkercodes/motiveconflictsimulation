# ─── Baseline Configuration ───────────────────────────────────
# This is the default configuration
# use it to create new experimental conditions.
# Copy and paste this file, be sure to have the tag, notes & general settings
# and the chosen_xxx, together with their parameters. 
# Other information can be deleted to keep a better overview.
# to test different chosen_influence for example, you just need to repeat
# the "chosen_influence: xxx" to get it in the combinatorics
# ──────────────────────────────────────────────────────────────

tag: "First_Hypothesis" #make sure to use _ instead of space
notes: "To figure out how many simulations we should do"

# General settings
seed: 42
steps: [50, 200, 500, 1000]
n_simulations: 30
n_motives: 8

# Influence
influence:
  chosen_influence: sinus_influence #options: all of the below
  sinus_influence:
    amplitude: [0, 0.1, 0.2, 0.3, 0.4]
    elevation: [0, 0.1, 0.2, 0.3, 0.4]

# starting_values
starting_values:
  chosen_starting_values: random_starting_values #options: all of the below
  random_starting_values:
    low: 0
    high: [0.1, 0.5, 1]
  fixed_sat_matrix: 
    satisfaction: [0.2]

# Decay
decay:
  chosen_decay: flat_decay #options: all of the below
  sinus_decay:
    start_motive: 3
    amplitude: 0.05
    elevation: 0.06
  flat_decay:
    decay_rate: [0.01, 0.02, 0.05, 0.1, 0.15, 0.2, 0.5, 1]

# Growth rules
growth: 
  chosen_growth: flat_growth #options: all of the below
  flat_growth:
    growth_rate: 1

# activation check
activation_check:
  chosen_activation_check: linear_check #options: all of the below
  linear_check: {}

